name: Alert Scanner (30min)

on:
  # Déclenché par cron-job.org toutes les 30 minutes
  workflow_dispatch:

# Évite que deux scans d'alertes se chevauchent
concurrency:
  group: alert-scanner
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Scan rapide — 8 min max

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run alert scanner
        run: python alert_scanner.py
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_TOKEN: ${{ secrets.CRYPTOPANIC_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONIOENCODING: utf-8

      # Alerte silencieuse si le scanner plante (pas de spam — on ne notifie qu'une fois)
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=⚠️ Alert scanner en erreur — vérifier GitHub Actions" \
            -d "parse_mode=Markdown"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
