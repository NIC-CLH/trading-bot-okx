name: Alert Scanner (30min)

on:
  # Déclenché par cron-job.org toutes les 30 minutes
  # (pas de cron GitHub — trop peu fiable)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "OKX_API_KEY=${{ secrets.OKX_API_KEY }}" >> .env
          echo "OKX_SECRET=${{ secrets.OKX_SECRET }}" >> .env
          echo "OKX_PASSPHRASE=${{ secrets.OKX_PASSPHRASE }}" >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "CRYPTOPANIC_TOKEN=${{ secrets.CRYPTOPANIC_TOKEN }}" >> .env

      - name: Run alert scanner
        run: python alert_scanner.py
        env:
          PYTHONIOENCODING: utf-8
