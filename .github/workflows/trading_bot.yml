name: Trading Bot OKX

on:
  # Cron GitHub désactivé — trop peu fiable (dérive jusqu'à 2h)
  # Déclenchement via cron-job.org → workflow_dispatch toutes les 4h exactes
  # schedule:
  #   - cron: "0 */4 * * *"
  workflow_dispatch:           # Déclenché par cron-job.org (ou manuel GitHub)

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "OKX_API_KEY=${{ secrets.OKX_API_KEY }}" >> .env
          echo "OKX_SECRET=${{ secrets.OKX_SECRET }}" >> .env
          echo "OKX_PASSPHRASE=${{ secrets.OKX_PASSPHRASE }}" >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Run market scan
        run: python run_once.py
        env:
          PYTHONIOENCODING: utf-8
